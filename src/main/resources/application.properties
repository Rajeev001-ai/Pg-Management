spring.application.name=staynext

# Database configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/staynext}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}

# Thymeleaf configuration
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# Server configuration
server.port=${PORT:8081}

# Cloudinary image upload configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Default admin seed account
# Change ADMIN_EMAIL and ADMIN_PASSWORD in .env before first startup on a fresh database.
app.admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:true}
app.seed.admin.email=${ADMIN_EMAIL:admin@gmail.com}
app.seed.admin.password=${ADMIN_PASSWORD:admin123}
app.data-seeder.enabled=${DATA_SEEDER_ENABLED:false}

# Default seeded login credentials for testing
# These users are created in config/DataSeeder.java when the users table is empty.
# Admin: ${ADMIN_EMAIL:admin@gmail.com} / ${ADMIN_PASSWORD:admin123}
# PG Owner: owner@gmail.com / owner123
# Tenant: tenant@gmail.com / tenant123
