<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="col-lg-2 app-sidebar owner-sidebar p-0">
	<div class="sidebar-brand">StayNext Owner</div>
	<nav class="sidebar-nav">
		<a th:classappend="${activePage == 'dashboard'} ? ' active'" th:href="@{/owner/dashboard}"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
		<a th:classappend="${activePage == 'pgs'} ? ' active'" th:href="@{/owner/pgs}"><i class="fa-solid fa-building"></i> My PG</a>
		<a th:classappend="${activePage == 'rooms'} ? ' active'" th:href="@{/owner/pgs}"><i class="fa-solid fa-bed"></i> Rooms</a>
		<a th:classappend="${activePage == 'tenants'} ? ' active'" th:href="@{/owner/bookings}"><i class="fa-solid fa-users"></i> Tenants</a>
		<a th:classappend="${activePage == 'bookings'} ? ' active'" th:href="@{/owner/bookings}"><i class="fa-solid fa-calendar-check"></i> Booking Requests</a>
		<a th:classappend="${activePage == 'rent-payments'} ? ' active'" th:href="@{/owner/rent-payments}"><i class="fa-solid fa-wallet"></i> Rent Management</a>
		<a th:classappend="${activePage == 'complaints'} ? ' active'" th:href="@{/owner/complaints}"><i class="fa-solid fa-headset"></i> Complaints</a>
		<a th:classappend="${activePage == 'profile'} ? ' active'" th:href="@{/owner/profile}"><i class="fa-solid fa-user-tie"></i> Profile</a>
		<form th:action="@{/logout}" method="post" class="mt-3">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button class="btn btn-link sidebar-logout" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
		</form>
	</nav>
</aside>
</body>
</html>
