<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="col-lg-2 app-sidebar admin-sidebar p-0">
	<div class="sidebar-brand">StayNext Admin</div>
	<nav class="sidebar-nav">
		<a th:classappend="${activePage == 'dashboard'} ? ' active'" th:href="@{/admin/dashboard}"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
		<a th:classappend="${activePage == 'pending-owners'} ? ' active'" th:href="@{/admin/owners/pending}"><i class="fa-solid fa-user-clock"></i> Pending Owners</a>
		<a th:classappend="${activePage == 'users'} ? ' active'" th:href="@{/admin/users}"><i class="fa-solid fa-users-gear"></i> Users</a>
		<a th:classappend="${activePage == 'owners'} ? ' active'" th:href="@{/admin/owners}"><i class="fa-solid fa-user-tie"></i> PG Owners</a>
		<a th:classappend="${activePage == 'tenants'} ? ' active'" th:href="@{/admin/tenants}"><i class="fa-solid fa-users"></i> Tenants</a>
		<a th:classappend="${activePage == 'pg-listings'} ? ' active'" th:href="@{/admin/pg-listings}"><i class="fa-solid fa-building"></i> PG Listings</a>
		<a th:classappend="${activePage == 'pending-listings'} ? ' active'" th:href="@{/admin/pg-listings/pending}"><i class="fa-solid fa-list-check"></i> Pending Listings</a>
		<a th:classappend="${activePage == 'bookings'} ? ' active'" th:href="@{/admin/bookings}"><i class="fa-solid fa-calendar-check"></i> Bookings</a>
		<a th:classappend="${activePage == 'complaints'} ? ' active'" th:href="@{/admin/complaints}"><i class="fa-solid fa-headset"></i> Complaints</a>
		<a th:classappend="${activePage == 'rent-payments'} ? ' active'" th:href="@{/admin/rent-payments}"><i class="fa-solid fa-chart-simple"></i> Reports</a>
		<form th:action="@{/logout}" method="post" class="mt-3">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button class="btn btn-link sidebar-logout" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
		</form>
	</nav>
</aside>
</body>
</html>
