<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="col-lg-2 app-sidebar tenant-sidebar p-0">
	<div class="sidebar-brand">StayNext Tenant</div>
	<nav class="sidebar-nav">
		<a th:classappend="${activePage == 'dashboard'} ? ' active'" th:href="@{/tenant/dashboard}"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
		<a th:classappend="${activePage == 'search-pg'} ? ' active'" th:href="@{/tenant/search-pg}"><i class="fa-solid fa-magnifying-glass-location"></i> Search PG</a>
		<a th:classappend="${activePage == 'bookings'} ? ' active'" th:href="@{/tenant/bookings}"><i class="fa-solid fa-calendar-check"></i> My Bookings</a>
		<a th:classappend="${activePage == 'complaints'} ? ' active'" th:href="@{/tenant/complaints}"><i class="fa-solid fa-headset"></i> My Complaints</a>
		<a th:classappend="${activePage == 'rent-payments'} ? ' active'" th:href="@{/tenant/rent-payments}"><i class="fa-solid fa-receipt"></i> Rent History</a>
		<a th:classappend="${activePage == 'profile'} ? ' active'" th:href="@{/tenant/profile}"><i class="fa-solid fa-user"></i> Profile</a>
		<form th:action="@{/logout}" method="post" class="mt-3">
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
			<button class="btn btn-link sidebar-logout" type="submit"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
		</form>
	</nav>
</aside>
</body>
</html>
