<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg app-navbar bg-white sticky-top">
	<div class="container">
		<a class="navbar-brand fw-bold text-primary d-flex align-items-center" th:href="@{/}">
			<span class="brand-mark"><i class="fa-solid fa-location-dot"></i></span>
			<span>StayNext</span>
		</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#publicNavbar">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="publicNavbar">
			<ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
				<li class="nav-item">
					<a class="nav-link" th:classappend="${activePage == 'home'} ? ' active'" th:href="@{/}">Home</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:classappend="${activePage == 'about'} ? ' active'" th:href="@{/about}">About</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:classappend="${activePage == 'features'} ? ' active'" th:href="@{/features}">Features</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:classappend="${activePage == 'contact'} ? ' active'" th:href="@{/contact}">Contact</a>
				</li>
				<li class="nav-item">
					<a class="btn btn-outline-primary ms-lg-2" th:href="@{/login}"><i class="fa-solid fa-right-to-bracket me-1"></i> Login</a>
				</li>
				<li class="nav-item">
					<a class="btn btn-primary ms-lg-2" th:href="@{/register}"><i class="fa-solid fa-user-plus me-1"></i> Register</a>
				</li>
			</ul>
		</div>
	</div>
</nav>
</body>
</html>
