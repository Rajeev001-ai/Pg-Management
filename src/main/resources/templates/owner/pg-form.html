<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${isEdit} ? 'Edit PG | StayNext Owner' : 'Add PG | StayNext Owner'">PG Form</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('add-pg')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1" th:text="${isEdit} ? 'Edit PG Listing' : 'Add PG Listing'">PG Form</span>
			</nav>
			<div class="dashboard-content">
				<div class="card form-card">
					<div class="card-body p-4">
						<form th:object="${pgListing}" th:action="${isEdit} ? @{/owner/pgs/edit/{id}(id=${pgListing.id})} : @{/owner/pgs/add}" method="post" enctype="multipart/form-data">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<div class="row g-3">
								<div class="col-md-6">
									<label class="form-label">PG Name</label>
									<input class="form-control" th:errorclass="is-invalid" th:field="*{pgName}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('pgName')}" th:errors="*{pgName}"></div>
								</div>
								<div class="col-md-6">
									<label class="form-label">PG Type</label>
									<select class="form-select" th:errorclass="is-invalid" th:field="*{pgType}" required>
										<option value="">Select type</option>
										<option th:each="type : ${pgTypes}" th:value="${type}" th:text="${type}">BOYS</option>
									</select>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('pgType')}" th:errors="*{pgType}"></div>
								</div>
								<div class="col-12">
									<label class="form-label">Description</label>
									<textarea class="form-control" rows="3" th:field="*{description}"></textarea>
								</div>
								<div class="col-md-6">
									<label class="form-label">PG Image</label>
									<input class="form-control" type="file" name="image" accept="image/*">
									<div class="form-text" th:if="${isEdit}">Leave empty to keep the current image.</div>
								</div>
								<div class="col-md-6" th:if="${isEdit}">
									<label class="form-label">Current Image</label>
									<div>
										<img class="image-preview"
											 th:src="${pgListing.imageUrl != null and !#strings.isEmpty(pgListing.imageUrl)} ? ${pgListing.imageUrl} : @{/images/pg-placeholder.svg}"
											 alt="Current PG image">
									</div>
								</div>
								<div class="col-12">
									<label class="form-label">Address</label>
									<input class="form-control" th:errorclass="is-invalid" th:field="*{address}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
								</div>
								<div class="col-md-4">
									<label class="form-label">City</label>
									<input class="form-control" th:errorclass="is-invalid" th:field="*{city}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
								</div>
								<div class="col-md-4">
									<label class="form-label">Area</label>
									<input class="form-control" th:errorclass="is-invalid" th:field="*{area}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('area')}" th:errors="*{area}"></div>
								</div>
								<div class="col-md-4">
									<label class="form-label">Rent Starting From</label>
									<input class="form-control" th:errorclass="is-invalid" type="number" step="0.01" th:field="*{monthlyRentStartingFrom}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('monthlyRentStartingFrom')}" th:errors="*{monthlyRentStartingFrom}"></div>
								</div>
								<div class="col-md-6">
									<label class="form-label">Latitude</label>
									<input class="form-control" type="number" step="any" th:field="*{latitude}">
								</div>
								<div class="col-md-6">
									<label class="form-label">Longitude</label>
									<input class="form-control" type="number" step="any" th:field="*{longitude}">
								</div>
								<div class="col-md-6">
									<label class="form-label">Facilities</label>
									<textarea class="form-control" rows="4" th:field="*{facilities}"></textarea>
								</div>
								<div class="col-md-6">
									<label class="form-label">Rules</label>
									<textarea class="form-control" rows="4" th:field="*{rules}"></textarea>
								</div>
							</div>
							<div class="d-flex gap-2 mt-4">
								<button class="btn btn-primary" type="submit" th:text="${isEdit} ? 'Update PG' : 'Submit for Approval'">Save</button>
								<a class="btn btn-outline-secondary" th:href="@{/owner/pgs}">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
