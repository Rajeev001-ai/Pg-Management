<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Complaints | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('complaints')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Complaints</span>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Tenant</th>
									<th>PG</th>
									<th>Title</th>
									<th>Description</th>
									<th>Status</th>
									<th>Created</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="complaint : ${complaints}">
									<td>
										<div class="fw-semibold" th:text="${complaint.tenant.fullName}">Tenant</div>
										<div class="small text-secondary" th:text="${complaint.tenant.email}">tenant@example.com</div>
									</td>
									<td th:text="${complaint.pgListing.pgName}">PG</td>
									<td th:text="${complaint.title}">Title</td>
									<td th:text="${complaint.description}">Description</td>
									<td>
										<span class="badge" th:classappend="${complaint.status.name() == 'RESOLVED'} ? ' text-bg-success' : (${complaint.status.name() == 'IN_PROGRESS'} ? ' text-bg-primary' : ' text-bg-warning')" th:text="${complaint.status}">OPEN</span>
									</td>
									<td th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy HH:mm')}">13 Jun 2026</td>
									<td class="text-end">
										<form class="d-inline" th:if="${complaint.status.name() == 'OPEN'}" th:action="@{/owner/complaints/in-progress/{id}(id=${complaint.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-primary" type="submit">Mark In Progress</button>
										</form>
										<form class="d-inline" th:if="${complaint.status.name() != 'RESOLVED'}" th:action="@{/owner/complaints/resolved/{id}(id=${complaint.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-success" type="submit">Mark Resolved</button>
										</form>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(complaints)}">
									<td colspan="7" class="text-center text-secondary py-4">No complaints found.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
