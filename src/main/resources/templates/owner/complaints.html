<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Complaints | PG Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: #f1f5f9;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      padding: 20px;
      color: white;
    }

    .sidebar .brand {
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar .brand span { color: #60a5fa; }

    .sidebar .nav-link {
      color: #cbd5f5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: 0.3s;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(96,165,250,0.15);
      color: #fff;
    }

    /* MAIN */
    .main-content {
      margin-left: 250px;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 14px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    /* TABLE CARD */
    .table-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.08);
      padding: 25px;
    }

    table thead { background: #f8fafc; }
    table tbody tr:hover { background: #f1f5ff; }

    .badge-open { background: #f59e0b; }
    .badge-inprogress { background: #3b82f6; }
    .badge-resolved { background: #22c55e; }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">PG<span>Manager</span></div>

  <a class="nav-link" th:href="@{/owner/dashboard}">
    <i class="fa-solid fa-gauge"></i> Dashboard
  </a>
  <a class="nav-link" th:href="@{/owner/tenants}">
    <i class="fa-solid fa-users"></i> Tenants
  </a>
  <a class="nav-link" th:href="@{/owner/rooms}">
    <i class="fa-solid fa-door-closed"></i> Rooms
  </a>
  <a class="nav-link" th:href="@{/owner/rents}">
    <i class="fa-solid fa-indian-rupee-sign"></i> Rents
  </a>
  <a class="nav-link active" th:href="@{/owner/complaints}">
    <i class="fa-solid fa-comments"></i> Complaints
  </a>
  <a class="nav-link" th:href="@{/owner/visitors}">
    <i class="fa-solid fa-user-check"></i> Visitors
  </a>
</div> 

<!-- MAIN -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold">Complaints</h6>
    <a th:href="@{/owner/complaints/new}" class="btn btn-primary btn-sm">
      <i class="fa-solid fa-plus me-1"></i> New Complaint
    </a>
  </div>

  <!-- CONTENT -->
  <div class="container-fluid p-4">

    <div class="table-card">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Tenant</th>
            <th>Category</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="c : ${complaints}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.tenantId}"></td>
            <td th:text="${c.category}"></td>
            <td>
              <span th:if="${c.status == 'OPEN'}" class="badge badge-open">Open</span>
              <span th:if="${c.status == 'IN_PROGRESS'}" class="badge badge-inprogress">In Progress</span>
              <span th:if="${c.status == 'RESOLVED'}" class="badge badge-resolved">Resolved</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>


</body>
</html>
