<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Rent Payments | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('rent-payments')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1" th:text="${selectedPg != null ? 'Rent Payments - ' + selectedPg.pgName : 'Rent Payments'}">Rent Payments</span>
				<a class="btn btn-primary" th:href="@{/owner/rent-payments/create}">Create Rent</a>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Tenant</th>
									<th>PG</th>
									<th>Amount</th>
									<th>Month</th>
									<th>Year</th>
									<th>Status</th>
									<th>Payment Date</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="payment : ${rentPayments}">
									<td>
										<div class="fw-semibold" th:text="${payment.tenant.fullName}">Tenant</div>
										<div class="small text-secondary" th:text="${payment.tenant.email}">tenant@example.com</div>
									</td>
									<td th:text="${payment.pgListing.pgName}">PG</td>
									<td>Rs. <span th:text="${payment.amount}">9000</span></td>
									<td th:text="${payment.month}">JUNE</td>
									<td th:text="${payment.year}">2026</td>
									<td>
										<span class="badge" th:classappend="${payment.status.name() == 'PAID'} ? ' text-bg-success' : (${payment.status.name() == 'OVERDUE'} ? ' text-bg-danger' : ' text-bg-warning')" th:text="${payment.status}">PENDING</span>
									</td>
									<td th:text="${payment.paymentDate != null ? #temporals.format(payment.paymentDate, 'dd MMM yyyy HH:mm') : '-'}">-</td>
									<td class="text-end">
										<form class="d-inline" th:if="${payment.status.name() != 'PAID'}" th:action="@{/owner/rent-payments/mark-paid/{id}(id=${payment.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-success" type="submit">Mark Paid</button>
										</form>
										<form class="d-inline" th:if="${payment.status.name() != 'OVERDUE'}" th:action="@{/owner/rent-payments/mark-overdue/{id}(id=${payment.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-danger" type="submit">Mark Overdue</button>
										</form>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(rentPayments)}">
									<td colspan="8" class="text-center text-secondary py-4">No rent payments found.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
