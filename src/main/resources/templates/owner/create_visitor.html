<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Visitor | PG Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body { background: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; }

    /* SIDEBAR */
    .sidebar {
      position: fixed; top: 0; left: 0; width: 250px; height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      padding: 20px; color: white;
    }
    .sidebar .brand { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 30px; }
    .sidebar .brand span { color: #60a5fa; }
    .sidebar .nav-link { color: #cbd5f5; padding: 12px 16px; border-radius: 12px; margin-bottom: 6px; display: flex; gap: 12px; align-items: center; transition: 0.3s; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(96,165,250,0.15); color: #fff; }

    /* MAIN */
    .main-content { margin-left: 250px; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 14px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex; justify-content: space-between; align-items: center; z-index: 10;
    }

    /* FORM CARD */
    .form-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      box-shadow: 0 20px 35px rgba(0,0,0,0.08);
    }

    .form-control, .form-select { border-radius: 12px; padding: 12px; }
    .form-control:focus, .form-select:focus { box-shadow: none; border-color: #3b82f6; }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">PG<span>Manager</span></div>

   <a class="nav-link" th:href="@{/owner/dashboard}">
    <i class="fa-solid fa-gauge"></i> Dashboard
  </a>
  <a class="nav-link" th:href="@{/owner/tenants}">
    <i class="fa-solid fa-users"></i> Tenants
  </a>
  <a class="nav-link" th:href="@{/owner/rooms}">
    <i class="fa-solid fa-door-closed"></i> Rooms
  </a>
  <a class="nav-link" th:href="@{/owner/rents}">
    <i class="fa-solid fa-indian-rupee-sign"></i> Rents
  </a>
  <a class="nav-link" th:href="@{/owner/complaints}">
    <i class="fa-solid fa-comments"></i> Complaints
  </a>
  <a class="nav-link active" th:href="@{/owner/visitors}">
    <i class="fa-solid fa-user-check"></i> Visitors
  </a>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold">Add Visitor</h6>
    <a th:href="@{/owner/visitors}" class="btn btn-outline-secondary btn-sm">
      <i class="fa-solid fa-arrow-left me-1"></i> Back
    </a>
  </div>

  <!-- CONTENT -->
  <div class="container-fluid p-4 d-flex justify-content-center">

    <div class="form-card">
      <form th:action="@{/owner/visitors}" th:object="${visitor}" method="post">

        <!-- Tenant -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Tenant</label>
          <select class="form-select" th:field="*{tenantId}" required>
            <option value="">Select Tenant</option>
            <option th:each="t : ${tenants}" th:value="${t.id}" th:text="${t.name + ' (Room ' + t.roomNo + ')'}"></option>
          </select>
        </div>

        <!-- Visitor Name -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Visitor Name</label>
          <input type="text" class="form-control" th:field="*{visitorName}" placeholder="Enter visitor name" required>
        </div>

        <!-- In Time -->
        <div class="mb-3">
          <label class="form-label fw-semibold">In Time</label>
          <input type="datetime-local" class="form-control" th:field="*{inTime}" required>
        </div>

        <!-- Out Time -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Out Time</label>
          <input type="datetime-local" class="form-control" th:field="*{outTime}">
        </div>

        <!-- BUTTONS -->
        <div class="d-flex gap-3">
          <button class="btn btn-primary px-4">
            <i class="fa-solid fa-check me-1"></i> Save
          </button>
          <a th:href="@{/owner/visitors}" class="btn btn-light px-4">Cancel</a>
        </div>

      </form>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
