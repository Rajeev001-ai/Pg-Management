<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Add Room | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('pgs')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Add Room - <span th:text="${pgListing.pgName}">PG</span></span>
			</nav>
			<div class="dashboard-content">
				<div class="card form-card">
					<div class="card-body p-4">
						<form th:object="${room}" th:action="@{/owner/rooms/add/{pgId}(pgId=${pgListing.id})}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<div class="row g-3">
								<div class="col-md-6">
									<label class="form-label">Room Number</label>
									<input class="form-control" th:errorclass="is-invalid" th:field="*{roomNumber}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('roomNumber')}" th:errors="*{roomNumber}"></div>
								</div>
								<div class="col-md-6">
									<label class="form-label">Room Type</label>
									<select class="form-select" th:errorclass="is-invalid" th:field="*{roomType}" required>
										<option value="">Select type</option>
										<option th:each="type : ${roomTypes}" th:value="${type}" th:text="${type}">SINGLE</option>
									</select>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('roomType')}" th:errors="*{roomType}"></div>
								</div>
								<div class="col-md-4">
									<label class="form-label">Rent Amount</label>
									<input class="form-control" th:errorclass="is-invalid" type="number" step="0.01" th:field="*{rentAmount}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('rentAmount')}" th:errors="*{rentAmount}"></div>
								</div>
								<div class="col-md-4">
									<label class="form-label">Total Beds</label>
									<input class="form-control" th:errorclass="is-invalid" type="number" min="1" th:field="*{totalBeds}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('totalBeds')}" th:errors="*{totalBeds}"></div>
								</div>
								<div class="col-md-4">
									<label class="form-label">Available Beds</label>
									<input class="form-control" th:errorclass="is-invalid" type="number" min="0" th:field="*{availableBeds}" required>
									<div class="invalid-feedback" th:if="${#fields.hasErrors('availableBeds')}" th:errors="*{availableBeds}"></div>
								</div>
								<div class="col-12">
									<label class="form-label">Description</label>
									<textarea class="form-control" rows="4" th:field="*{description}"></textarea>
								</div>
							</div>
							<div class="d-flex gap-2 mt-4">
								<button class="btn btn-primary" type="submit">Save Room</button>
								<a class="btn btn-outline-secondary" th:href="@{/owner/rooms/{pgId}(pgId=${pgListing.id})}">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
