<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Booking Requests | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('bookings')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Booking Requests</span>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Tenant</th>
									<th>PG</th>
									<th>Room</th>
									<th>Message</th>
									<th>Status</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="request : ${bookingRequests}">
									<td>
										<div th:text="${request.tenant.fullName}">Tenant</div>
										<div class="small text-secondary" th:text="${request.tenant.email}">tenant@example.com</div>
									</td>
									<td th:text="${request.pgListing.pgName}">PG</td>
									<td th:text="${request.room != null ? request.room.roomNumber : '-'}">101</td>
									<td th:text="${request.message ?: '-'}">Message</td>
									<td>
										<span class="badge" th:classappend="${request.status.name() == 'ACCEPTED'} ? ' text-bg-success' : (${request.status.name() == 'REJECTED'} ? ' text-bg-danger' : (${request.status.name() == 'CANCELLED'} ? ' text-bg-secondary' : ' text-bg-warning'))" th:text="${request.status}">PENDING</span>
									</td>
									<td class="text-end">
										<form class="d-inline" th:if="${request.status.name() == 'PENDING'}" th:action="@{/owner/bookings/accept/{id}(id=${request.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-success" type="submit">Accept</button>
										</form>
										<form class="d-inline" th:if="${request.status.name() == 'PENDING'}" th:action="@{/owner/bookings/reject/{id}(id=${request.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-danger" type="submit">Reject</button>
										</form>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(bookingRequests)}">
									<td colspan="6" class="text-center text-secondary py-4">No booking requests yet.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
