<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My PG Listings | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('pgs')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">My PG Listings</span>
				<a class="btn btn-primary" th:href="@{/owner/pgs/add}">Add PG</a>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Image</th>
									<th>PG Name</th>
									<th>Location</th>
									<th>Rent From</th>
									<th>Status</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="pg : ${pgListings}">
									<td>
										<img class="owner-pg-thumb"
											 th:src="${pg.imageUrl != null and !#strings.isEmpty(pg.imageUrl)} ? ${pg.imageUrl} : @{/images/pg-placeholder.svg}"
											 th:alt="${pg.pgName}">
									</td>
									<td>
										<div class="fw-semibold" th:text="${pg.pgName}">PG Name</div>
										<div class="small text-secondary" th:text="${pg.pgType}">BOYS</div>
									</td>
									<td th:text="${pg.area + ', ' + pg.city}">Area, City</td>
									<td>Rs. <span th:text="${pg.monthlyRentStartingFrom}">9000</span></td>
									<td>
										<span class="badge" th:classappend="${pg.status.name() == 'APPROVED'} ? ' text-bg-success' : (${pg.status.name() == 'REJECTED'} ? ' text-bg-danger' : ' text-bg-warning')" th:text="${pg.status}">PENDING</span>
									</td>
									<td class="text-end">
										<a class="btn btn-sm btn-outline-primary" th:href="@{/owner/pgs/edit/{id}(id=${pg.id})}">Edit</a>
										<a class="btn btn-sm btn-outline-secondary" th:href="@{/owner/rooms/{pgId}(pgId=${pg.id})}">Rooms</a>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(pgListings)}">
									<td colspan="6" class="text-center text-secondary py-4">No PG listings yet.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
