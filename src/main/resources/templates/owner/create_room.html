<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Room | PG Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: #f1f5f9;
      font-family: 'Inter', sans-serif;
      margin: 0;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      padding: 20px;
      color: white;
    }

    .sidebar .brand {
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar .brand span {
      color: #60a5fa;
    }

    .sidebar .nav-link {
      color: #cbd5f5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      display: flex;
      gap: 12px;
      align-items: center;
      transition: 0.3s;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(96,165,250,0.15);
      color: #fff;
    }

    /* MAIN */
    .main-content {
      margin-left: 250px;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 14px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* FORM CARD */
    .form-card {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.08);
      max-width: 600px;
      margin: auto;
    }

    .form-label {
      font-weight: 600;
    }

    .form-control, .form-select {
      border-radius: 12px;
      padding: 12px;
    }

    .btn-primary {
      border-radius: 12px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">PG<span>Manager</span></div>

   <a class="nav-link" th:href="@{/owner/dashboard}">
    <i class="fa-solid fa-gauge"></i> Dashboard
  </a>
  <a class="nav-link" th:href="@{/owner/tenants}">
    <i class="fa-solid fa-users"></i> Tenants
  </a>
  <a class="nav-link active" th:href="@{/owner/rooms}">
    <i class="fa-solid fa-door-closed"></i> Rooms
  </a>
  <a class="nav-link" th:href="@{/owner/rents}">
    <i class="fa-solid fa-indian-rupee-sign"></i> Rents
  </a>
  <a class="nav-link" th:href="@{/owner/complaints}">
    <i class="fa-solid fa-comments"></i> Complaints
  </a>
  <a class="nav-link" th:href="@{/owner/visitors}">
    <i class="fa-solid fa-user-check"></i> Visitors
  </a>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold">Add New Room</h6>
    <a th:href="@{/owner/rooms}" class="btn btn-outline-secondary btn-sm">
      <i class="fa-solid fa-arrow-left"></i> Back
    </a>
  </div>

  <!-- CONTENT -->
  <div class="container-fluid p-4">

    <div class="form-card">
      <h4 class="fw-bold mb-4">Room Details</h4>

      <form th:action="@{/owner/rooms}" th:object="${room}" method="post">

        <div class="mb-3">
          <label class="form-label">Room Number</label>
          <input type="number" th:field="*{roomNo}" class="form-control" placeholder="Enter room number" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Room Type</label>
          <input type="text" th:field="*{type}" class="form-control" placeholder="Single / Double / AC" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Monthly Rent (₹)</label>
          <input type="number" th:field="*{rent}" class="form-control" placeholder="Enter rent amount" required>
        </div>

        <div class="mb-4">
          <label class="form-label">Status</label>
          <select th:field="*{status}" class="form-select">
            <option value="VACANT">Vacant</option>
            <option value="OCCUPIED">Occupied</option>
          </select>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a th:href="@{/owner/rooms}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-floppy-disk me-1"></i> Save Room
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
