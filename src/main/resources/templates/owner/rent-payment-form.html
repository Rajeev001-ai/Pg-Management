<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Create Rent Payment | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('rent-payments')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Create Rent Payment</span>
			</nav>
			<div class="dashboard-content">
				<div class="card form-card">
					<div class="card-body p-4">
						<form th:action="@{/owner/rent-payments/create}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<div class="row g-3">
								<div class="col-md-6">
									<label class="form-label">Tenant</label>
									<select class="form-select" name="tenantId" required>
										<option value="">Select tenant</option>
										<option th:each="tenant : ${tenants}" th:value="${tenant.id}" th:text="${tenant.fullName + ' - ' + tenant.email}">Tenant</option>
									</select>
								</div>
								<div class="col-md-6">
									<label class="form-label">PG Listing</label>
									<select class="form-select" name="pgListingId" required>
										<option value="">Select PG</option>
										<option th:each="pg : ${pgListings}" th:value="${pg.id}" th:text="${pg.pgName + ' - ' + pg.area + ', ' + pg.city}">PG</option>
									</select>
								</div>
								<div class="col-md-4">
									<label class="form-label">Amount</label>
									<input class="form-control" name="amount" type="number" min="0" step="0.01" required>
								</div>
								<div class="col-md-4">
									<label class="form-label">Month</label>
									<input class="form-control" name="month" th:value="${currentMonth}" required>
								</div>
								<div class="col-md-4">
									<label class="form-label">Year</label>
									<input class="form-control" name="year" type="number" min="2000" th:value="${currentYear}" required>
								</div>
							</div>
							<div class="d-flex gap-2 mt-4">
								<button class="btn btn-primary" type="submit">Create Pending Rent</button>
								<a class="btn btn-outline-secondary" th:href="@{/owner/rent-payments}">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
