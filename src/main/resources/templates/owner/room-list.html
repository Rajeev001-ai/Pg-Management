<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Rooms | StayNext Owner</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/owner-sidebar :: sidebar('pgs')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Rooms - <span th:text="${pgListing.pgName}">PG</span></span>
				<a class="btn btn-primary" th:href="@{/owner/rooms/add/{pgId}(pgId=${pgListing.id})}">Add Room</a>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Room Number</th>
									<th>Type</th>
									<th>Rent</th>
									<th>Total Beds</th>
									<th>Available Beds</th>
									<th>Description</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="room : ${rooms}">
									<td th:text="${room.roomNumber}">101</td>
									<td th:text="${room.roomType}">SINGLE</td>
									<td>Rs. <span th:text="${room.rentAmount}">8000</span></td>
									<td th:text="${room.totalBeds}">1</td>
									<td th:text="${room.availableBeds}">1</td>
									<td th:text="${room.description ?: '-'}">Description</td>
								</tr>
								<tr th:if="${#lists.isEmpty(rooms)}">
									<td colspan="6" class="text-center text-secondary py-4">No rooms added yet.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
