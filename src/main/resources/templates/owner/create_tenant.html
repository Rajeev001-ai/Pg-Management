<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Tenant | PG Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      margin: 0;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      padding: 20px;
      color: #fff;
    }

    .sidebar .brand {
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar .brand span {
      color: #60a5fa;
    }

    .sidebar .nav-link {
      color: #cbd5f5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.3s;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(96,165,250,0.15);
      color: #fff;
    }

    /* MAIN */
    .main-content {
      margin-left: 250px;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 14px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    /* FORM CARD */
    .form-card {
      background: #fff;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
      max-width: 650px;
      margin: auto;
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .form-control {
      border-radius: 12px;
      padding: 12px;
    }

    .btn-primary {
      border-radius: 12px;
      padding: 10px 18px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">PG<span>Manager</span></div>

  <a class="nav-link" th:href="@{/owner/dashboard}">
    <i class="fa-solid fa-gauge"></i> Dashboard
  </a>
  <a class="nav-link active" th:href="@{/owner/tenants}">
    <i class="fa-solid fa-users"></i> Tenants
  </a>
  <a class="nav-link" th:href="@{/owner/rooms}">
    <i class="fa-solid fa-door-closed"></i> Rooms
  </a>
  <a class="nav-link" th:href="@{/owner/rents}">
    <i class="fa-solid fa-indian-rupee-sign"></i> Rents
  </a>
  <a class="nav-link" th:href="@{/owner/complaints}">
    <i class="fa-solid fa-comments"></i> Complaints
  </a>
  <a class="nav-link" th:href="@{/owner/visitors}">
    <i class="fa-solid fa-user-check"></i> Visitors
  </a>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold">Add New Tenant</h6>
    <a th:href="@{/owner/tenants}" class="btn btn-outline-secondary btn-sm">
      ← Back
    </a>
  </div>

  <!-- CONTENT -->
  <div class="container-fluid p-4">

    <div class="form-card">

      <form th:action="@{/owner/tenants}" th:object="${tenant}" method="post">

        <div class="row g-3">
          <div class="col-md-6">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Tenant name" required>
          </div>

          <div class="col-md-6">
            <label>Phone Number</label>
            <input type="text" th:field="*{phone}" class="form-control" placeholder="Mobile number" required>
          </div>

          <div class="col-md-6">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Email address">
          </div>

          <div class="col-md-6">
            <label>Room Number</label>
            <input type="number" th:field="*{roomNo}" class="form-control" placeholder="Room no" required>
          </div>

          <div class="col-md-12">
            <label>ID Proof (Aadhaar / PAN)</label>
            <input type="text" th:field="*{idProof}" class="form-control" placeholder="ID number">
          </div>
        </div>

        <div class="mt-4 d-flex justify-content-end gap-2">
          <a th:href="@{/owner/tenants}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-check me-1"></i> Save Tenant
          </button>
        </div>

      </form>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
