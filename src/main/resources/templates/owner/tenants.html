<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Tenants | PG Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      margin: 0;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #0f172a, #020617);
      padding: 20px;
      color: #fff;
    }

    .sidebar .brand {
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar .brand span {
      color: #60a5fa;
    }

    .sidebar .nav-link {
      color: #cbd5f5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.3s;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(96,165,250,0.15);
      color: #fff;
    }

    /* MAIN */
    .main-content {
      margin-left: 250px;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 14px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    /* CONTENT BOX */
    .content-box {
      background: #fff;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    table th {
      background: #f8fafc;
      font-weight: 600;
    }

    .action-btn {
      padding: 6px 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">PG<span>Manager</span></div>

  <a class="nav-link" th:href="@{/owner/dashboard}">
    <i class="fa-solid fa-gauge"></i> Dashboard
  </a>
  <a class="nav-link active" th:href="@{/owner/tenants}">
    <i class="fa-solid fa-users"></i> Tenants
  </a>
  <a class="nav-link" th:href="@{/owner/rooms}">
    <i class="fa-solid fa-door-closed"></i> Rooms
  </a>
  <a class="nav-link" th:href="@{/owner/rents}">
    <i class="fa-solid fa-indian-rupee-sign"></i> Rents
  </a>
  <a class="nav-link" th:href="@{/owner/complaints}">
    <i class="fa-solid fa-comments"></i> Complaints
  </a>
  <a class="nav-link" th:href="@{/owner/visitors}">
    <i class="fa-solid fa-user-check"></i> Visitors
  </a>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold">Tenants Management</h6>
    <a th:href="@{/owner/tenants/new}" class="btn btn-primary">
      <i class="fa-solid fa-plus me-1"></i> Add Tenant
    </a>
  </div>

  <!-- CONTENT -->
  <div class="container-fluid p-4">

    <div class="content-box">

      <!-- SEARCH -->
      <div class="row mb-3">
        <div class="col-md-4">
          <input type="text" class="form-control" placeholder="Search tenant...">
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Room</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="t : ${tenants}">
              <td th:text="${t.id}"></td>
              <td th:text="${t.name}"></td>
              <td th:text="${t.phone}"></td>
              <td>
                <span class="badge bg-success" th:text="${t.roomNo}"></span>
              </td>
              <td class="text-center">
                <a th:href="@{/tenants/edit/{id}(id=${t.id})}"
                   class="btn btn-warning btn-sm action-btn">
                  <i class="fa-solid fa-pen"></i>
                </a>
                <a th:href="@{/tenants/delete/{id}(id=${t.id})}"
                   class="btn btn-danger btn-sm action-btn"
                   onclick="return confirm('Are you sure?')">
                  <i class="fa-solid fa-trash"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
