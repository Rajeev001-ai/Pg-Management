<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Owner Dashboard | PG Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      margin: 0;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 250px;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: #fff;
      padding: 20px 15px;
      z-index: 1000;
    }

    .sidebar .brand {
      font-size: 1.4rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 35px;
    }

    .sidebar .brand span {
      color: #60a5fa;
    }

    .sidebar .nav-link {
      color: #cbd5f5;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.3s;
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(96,165,250,0.15);
      color: #fff;
    }

    /* ================= MAIN ================= */
    .main-content {
      margin-left: 250px;
      min-height: 100vh;
    }

    /* ================= TOPBAR ================= */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      padding: 14px 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ================= CARDS ================= */
    .stat-card {
      border-radius: 20px;
      padding: 25px;
      color: #fff;
      transition: 0.35s;
      box-shadow: 0 20px 35px rgba(0,0,0,0.15);
    }

    .stat-card:hover {
      transform: translateY(-8px);
    }

    .icon-box {
      width: 55px;
      height: 55px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background: rgba(255,255,255,0.25);
      margin-bottom: 15px;
    }

    .bg-blue {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
    }

    .bg-green {
      background: linear-gradient(135deg, #22c55e, #166534);
    }

    .bg-yellow {
      background: linear-gradient(135deg, #facc15, #ca8a04);
      color: #1f2937;
    }

    .bg-red {
      background: linear-gradient(135deg, #ef4444, #7f1d1d);
    }

    /* ================= CONTENT BOX ================= */
    .content-box {
      background: #fff;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">PG<span>Manager</span></div>

  <a class="nav-link active" href="#">
    <i class="fa-solid fa-gauge"></i> Dashboard
  </a>
  <a class="nav-link" th:href="@{/owner/tenants}">
    <i class="fa-solid fa-users"></i> Tenants
  </a>
  <a class="nav-link" th:href="@{/owner/rooms}">
    <i class="fa-solid fa-door-closed"></i> Rooms
  </a>
  <a class="nav-link" th:href="@{/owner/rents}">
    <i class="fa-solid fa-indian-rupee-sign"></i> Rents
  </a>
  <a class="nav-link" th:href="@{/owner/complaints}">
    <i class="fa-solid fa-comments"></i> Complaints
  </a>
  <a class="nav-link" th:href="@{/owner/visitors}">
    <i class="fa-solid fa-user-check"></i> Visitors
  </a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <!-- TOPBAR -->
  <div class="topbar">
    <h6 class="mb-0 fw-semibold">Welcome back, Owner 👋</h6>
    <div>
      <i class="fa-regular fa-bell me-3"></i>
      <i class="fa-solid fa-user-circle fa-lg"></i>
    </div>
  </div>

  <div class="container-fluid p-4">

    <!-- STATS -->
    <div class="row g-4">
      <div class="col-lg-3 col-md-6">
        <div class="stat-card bg-blue">
          <div class="icon-box"><i class="fa-solid fa-users"></i></div>
          <h6>Total Tenants</h6>
          <h3 th:text="${totalTenants}">0</h3>
        </div>
      </div>

      <div class="col-lg-3 col-md-6">
        <div class="stat-card bg-green">
          <div class="icon-box"><i class="fa-solid fa-door-open"></i></div>
          <h6>Vacant Rooms</h6>
          <h3 th:text="${vacantRooms}">0</h3>
        </div>
      </div>

      <div class="col-lg-3 col-md-6">
        <div class="stat-card bg-yellow">
          <div class="icon-box"><i class="fa-solid fa-money-bill-wave"></i></div>
          <h6>Pending Rents</h6>
          <h3 th:text="${pendingRent}">0</h3>
        </div>
      </div>

      <div class="col-lg-3 col-md-6">
        <div class="stat-card bg-red">
          <div class="icon-box"><i class="fa-solid fa-circle-exclamation"></i></div>
          <h6>Complaints</h6>
          <h3 th:text="${pendingComplaints}">0</h3>
        </div>
      </div>
    </div>

    <!-- CHARTS -->
    <div class="row mt-5 g-4">
      <div class="col-md-6">
        <div class="content-box">
          <h6 class="fw-semibold mb-3">Monthly Rent Collection</h6>
          <canvas id="rentChart"></canvas>
        </div>
      </div>

      <div class="col-md-6">
        <div class="content-box">
          <h6 class="fw-semibold mb-3">Tenant Distribution</h6>
          <canvas id="tenantChart"></canvas>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  new Chart(document.getElementById('rentChart'), {
    type: 'bar',
    data: {
      labels: ['Jan','Feb','Mar','Apr','May','Jun'],
      datasets: [{
        label: 'Rent',
        data: [12000,15000,13000,16000,17000,18000],
        backgroundColor: '#3b82f6'
      }]
    }
  });

  new Chart(document.getElementById('tenantChart'), {
    type: 'doughnut',
    data: {
      labels: ['Occupied','Vacant'],
      datasets: [{
        data: [18,7],
        backgroundColor: ['#22c55e','#ef4444']
      }]
    }
  });
</script>

</body>
</html>
