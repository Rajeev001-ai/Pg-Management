<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Login | StayNext</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/public-navbar :: navbar('auth')}"></nav>
<main class="container py-5 auth-shell d-flex align-items-center">
	<div class="row justify-content-center w-100">
		<div class="col-lg-5 col-md-7">
			<div class="card auth-card mx-auto">
				<div class="card-body p-4 p-md-5">
					<div class="feature-icon mb-3"><i class="fa-solid fa-right-to-bracket"></i></div>
					<h1 class="h3 fw-black mb-2">Welcome back</h1>
					<p class="text-secondary mb-4">Login to continue to your admin, owner, or tenant dashboard.</p>
					<div class="alert alert-danger" th:if="${param.error}">Invalid email or password, or account is not approved yet.</div>
					<div class="alert alert-success" th:if="${param.logout}">You have been logged out.</div>
					<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
					<form th:action="@{/login}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<div class="mb-3">
							<label class="form-label" for="username"><i class="fa-solid fa-envelope me-1"></i> Email</label>
							<input class="form-control" id="username" name="username" type="email" placeholder="you@example.com" required>
						</div>
						<div class="mb-4">
							<label class="form-label" for="password"><i class="fa-solid fa-lock me-1"></i> Password</label>
							<input class="form-control" id="password" name="password" type="password" placeholder="Enter password" required>
						</div>
						<button class="btn btn-primary w-100 btn-lg" type="submit">Login</button>
					</form>
					<p class="mt-4 mb-0 text-center">New user? <a class="fw-bold" th:href="@{/register}">Create an account</a></p>
				</div>
			</div>
		</div>
	</div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
