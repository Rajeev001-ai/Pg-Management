<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Register | StayNext</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/public-navbar :: navbar('auth')}"></nav>
<main class="container py-5">
	<div class="row justify-content-center">
		<div class="col-lg-7 col-md-9">
			<div class="card auth-card mx-auto">
				<div class="card-body p-4 p-md-5">
					<div class="feature-icon mb-3"><i class="fa-solid fa-user-plus"></i></div>
					<h1 class="h3 fw-black mb-2">Create your account</h1>
					<p class="text-secondary mb-4">Choose tenant for instant access or owner to submit for admin approval.</p>
					<div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
					<div class="d-flex flex-column flex-sm-row gap-2 mb-4">
						<a class="btn flex-fill" th:classappend="${registrationType == 'tenant'} ? ' btn-primary' : ' btn-outline-primary'" th:href="@{/register(type='tenant')}"><i class="fa-solid fa-user me-1"></i> Tenant Registration</a>
						<a class="btn flex-fill" th:classappend="${registrationType == 'owner'} ? ' btn-primary' : ' btn-outline-primary'" th:href="@{/register(type='owner')}"><i class="fa-solid fa-user-tie me-1"></i> PG Owner Registration</a>
					</div>
					<form th:object="${user}" th:action="@{/register}" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
						<input type="hidden" name="registrationType" th:value="${registrationType}">
						<div class="mb-3">
							<label class="form-label" for="fullName">Full Name</label>
							<input class="form-control" th:errorclass="is-invalid" id="fullName" th:field="*{fullName}" type="text" placeholder="Your full name" required>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
						</div>
				<div class="mb-3">
					<label class="form-label" for="email">Email</label>
					<input class="form-control" th:errorclass="is-invalid" id="email" th:field="*{email}" type="email" placeholder="you@example.com" required>
					<div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
				</div>
				<div class="mb-3">
					<label class="form-label" for="phone">Phone</label>
					<input class="form-control" th:errorclass="is-invalid" id="phone" th:field="*{phone}" type="text" placeholder="Mobile number" required>
					<div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
				</div>
				<div class="mb-3">
					<label class="form-label" for="password">Password</label>
					<input class="form-control" th:errorclass="is-invalid" id="password" th:field="*{password}" type="password" placeholder="Minimum 6 characters" required>
					<div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
				</div>
				<div th:if="${registrationType == 'owner'}">
					<div class="mb-3">
						<label class="form-label" for="pgName">PG Name</label>
						<input class="form-control" th:errorclass="is-invalid" id="pgName" th:field="*{pgName}" type="text" placeholder="Your PG or property name" required>
						<div class="invalid-feedback" th:if="${#fields.hasErrors('pgName')}" th:errors="*{pgName}"></div>
					</div>
					<div class="mb-3">
						<label class="form-label" for="pgAddress">PG Address</label>
						<textarea class="form-control" th:errorclass="is-invalid" id="pgAddress" th:field="*{pgAddress}" rows="3" placeholder="Complete PG address" required></textarea>
						<div class="invalid-feedback" th:if="${#fields.hasErrors('pgAddress')}" th:errors="*{pgAddress}"></div>
					</div>
				</div>
				<button class="btn btn-primary btn-lg w-100" type="submit" th:text="${registrationType == 'owner'} ? 'Submit for Admin Approval' : 'Register as Tenant'">Register</button>
			</form>
			<p class="mt-4 mb-0 text-center">Already registered? <a class="fw-bold" th:href="@{/login}">Login</a></p>
				</div>
			</div>
		</div>
	</div>
</main>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
