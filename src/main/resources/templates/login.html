<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login | PG Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- EMBEDDED CSS -->
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0b0f19, #141a2e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .brand {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
    }

    .brand span {
      color: #4f8cff;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .form-control {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
    }

    .form-control::placeholder {
      color: #9ca3af;
    }

    .form-control:focus {
      background: rgba(255,255,255,0.15);
      color: #fff;
      box-shadow: none;
      border: 1px solid #4f8cff;
    }

    .btn-primary {
      background: linear-gradient(90deg, #4f8cff, #9b6dff);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(79,140,255,0.4);
    }

    .extra-links a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    .error-msg {
      background: rgba(239,68,68,0.15);
      color: #fecaca;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .footer-text {
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 25px;
    }
    /* NAVBAR */
.glass-nav {
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}
  </style>
</head>
<body>

    <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4">PG<span class="text-primary">Manager</span></a>
    <div class="ms-auto">
      <a th:href="@{/register}" class="btn btn-outline-light me-2">Register</a>
      <a th:href="@{/}" class="btn btn-primary">Home</a>
    </div>
  </div>
</nav>


<div class="login-card" data-aos="zoom-in">

  <div class="brand">
    PG<span>Manager</span>
  </div>

  <div class="subtitle">
    Login to manage your PG smarter
  </div>

  <!-- ERROR MESSAGE (Spring Security) -->
  <div th:if="${param.error}" class="error-msg">
    Invalid email or password
  </div>

  <!-- LOGIN FORM -->
  <form th:action="@{/login}" method="post">

    <div class="mb-3">
      <input type="email"
             name="username"
             class="form-control"
             placeholder="Email address"
             required>
    </div>

    <div class="mb-3">
      <input type="password"
             name="password"
             class="form-control"
             placeholder="Password"
             required>
    </div>

    <button type="submit" class="btn btn-primary w-100 mt-2">
      Sign In
    </button>

  </form>

  <div class="extra-links d-flex justify-content-between mt-4">
    <a href="#">Forgot password?</a>
    <a th:href="@{/register}">Create account</a>
  </div>

  <div class="footer-text">
    © 2026 PG Manager · Secure Login
  </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 900, once: true });
</script>

</body>
</html>
