<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Complaints | StayNext Admin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/admin-sidebar :: sidebar('complaints')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Complaints</span>
			</nav>
			<div class="dashboard-content">
				<form class="row g-3 mb-4" th:action="@{/admin/complaints}" method="get">
					<div class="col-md-4">
						<select class="form-select" name="status">
							<option value="">All statuses</option>
							<option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${selectedStatus == status}">OPEN</option>
						</select>
					</div>
					<div class="col-md-auto d-grid">
						<button class="btn btn-primary" type="submit">Filter</button>
					</div>
					<div class="col-md-auto d-grid">
						<a class="btn btn-outline-secondary" th:href="@{/admin/complaints}">Clear</a>
					</div>
				</form>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Tenant</th>
									<th>PG</th>
									<th>Owner</th>
									<th>Title</th>
									<th>Description</th>
									<th>Status</th>
									<th>Created</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="complaint : ${complaints}">
									<td>
										<div class="fw-semibold" th:text="${complaint.tenant.fullName}">Tenant</div>
										<div class="small text-secondary" th:text="${complaint.tenant.email}">tenant@example.com</div>
									</td>
									<td th:text="${complaint.pgListing.pgName}">PG</td>
									<td th:text="${complaint.pgListing.owner.fullName}">Owner</td>
									<td th:text="${complaint.title}">Title</td>
									<td th:text="${complaint.description}">Description</td>
									<td>
										<span class="badge" th:classappend="${complaint.status.name() == 'RESOLVED'} ? ' text-bg-success' : (${complaint.status.name() == 'IN_PROGRESS'} ? ' text-bg-primary' : ' text-bg-warning')" th:text="${complaint.status}">OPEN</span>
									</td>
									<td th:text="${#temporals.format(complaint.createdAt, 'dd MMM yyyy HH:mm')}">13 Jun 2026</td>
								</tr>
								<tr th:if="${#lists.isEmpty(complaints)}">
									<td colspan="7" class="text-center text-secondary py-4">No complaints found.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
