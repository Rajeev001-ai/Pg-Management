<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Users | StayNext Admin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/admin-sidebar :: sidebar('users')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Users</span>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Name</th>
									<th>Email</th>
									<th>Phone</th>
									<th>Role</th>
									<th>Status</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="user : ${users}">
									<td th:text="${user.fullName}">User</td>
									<td th:text="${user.email}">user@example.com</td>
									<td th:text="${user.phone ?: '-'}">9999999999</td>
									<td><span class="badge text-bg-primary" th:text="${user.role}">TENANT</span></td>
									<td><span class="badge" th:classappend="${user.enabled} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${user.enabled} ? 'Enabled' : 'Disabled'">Enabled</span></td>
									<td class="text-end">
										<form class="d-inline" th:if="${user.enabled}" th:action="@{/admin/users/disable/{id}(id=${user.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-danger" type="submit">Disable</button>
										</form>
										<form class="d-inline" th:if="${!user.enabled}" th:action="@{/admin/users/enable/{id}(id=${user.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-success" type="submit">Enable</button>
										</form>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(users)}">
									<td colspan="6" class="text-center text-secondary py-4">No users found.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
