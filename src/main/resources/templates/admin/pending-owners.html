<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Pending Owner Approvals | StayNext Admin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/admin-sidebar :: sidebar('pending-owners')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Pending Owner Approvals</span>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Name</th>
									<th>Email</th>
									<th>Phone</th>
									<th>PG Name</th>
									<th>PG Address</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="owner : ${owners}">
									<td th:text="${owner.fullName}">Owner</td>
									<td th:text="${owner.email}">owner@example.com</td>
									<td th:text="${owner.phone ?: '-'}">9999999999</td>
									<td th:text="${owner.pgName ?: '-'}">PG Name</td>
									<td th:text="${owner.pgAddress ?: '-'}">PG Address</td>
									<td class="text-end">
										<form class="d-inline" th:action="@{/admin/owners/approve/{id}(id=${owner.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-success" type="submit">Approve</button>
										</form>
										<form class="d-inline" th:action="@{/admin/owners/reject/{id}(id=${owner.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-danger" type="submit">Reject</button>
										</form>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(owners)}">
									<td colspan="6" class="text-center text-secondary py-4">No pending owner approvals.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
