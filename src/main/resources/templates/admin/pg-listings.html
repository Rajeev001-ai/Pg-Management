<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${title + ' | StayNext Admin'}">PG Listings | StayNext Admin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/admin-sidebar :: sidebar(${pendingOnly} ? 'pending-listings' : 'pg-listings')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1" th:text="${title}">PG Listings</span>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>PG Name</th>
									<th>Location</th>
									<th>Owner</th>
									<th>Rent From</th>
									<th>Status</th>
									<th class="text-end">Actions</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="pg : ${pgListings}">
									<td>
										<div class="fw-semibold" th:text="${pg.pgName}">PG Name</div>
										<div class="small text-secondary" th:text="${pg.pgType}">BOYS</div>
									</td>
									<td th:text="${pg.area + ', ' + pg.city}">Area, City</td>
									<td>
										<div th:text="${pg.owner.fullName}">Owner</div>
										<div class="small text-secondary" th:text="${pg.owner.email}">owner@example.com</div>
									</td>
									<td>Rs. <span th:text="${pg.monthlyRentStartingFrom}">9000</span></td>
									<td>
										<span class="badge"
											  th:classappend="${pg.status.name() == 'APPROVED'} ? ' text-bg-success' : (${pg.status.name() == 'REJECTED'} ? ' text-bg-danger' : ' text-bg-warning')"
											  th:text="${pg.status}">PENDING</span>
									</td>
									<td class="text-end">
										<form class="d-inline" th:if="${pg.status.name() != 'APPROVED'}" th:action="@{/admin/pg-listings/approve/{id}(id=${pg.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-success" type="submit">Approve</button>
										</form>
										<form class="d-inline" th:if="${pg.status.name() != 'REJECTED'}" th:action="@{/admin/pg-listings/reject/{id}(id=${pg.id})}" method="post">
											<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
											<button class="btn btn-sm btn-outline-danger" type="submit">Reject</button>
										</form>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(pgListings)}">
									<td colspan="6" class="text-center text-secondary py-4">No PG listings found.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
