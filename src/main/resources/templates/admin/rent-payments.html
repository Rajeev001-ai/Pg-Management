<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Rent Payments | StayNext Admin</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/admin-sidebar :: sidebar('rent-payments')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Rent Payments</span>
			</nav>
			<div class="dashboard-content">
				<form class="row g-3 mb-4" th:action="@{/admin/rent-payments}" method="get">
					<div class="col-md-4">
						<select class="form-select" name="status">
							<option value="">All statuses</option>
							<option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${selectedStatus == status}">PENDING</option>
						</select>
					</div>
					<div class="col-md-auto d-grid">
						<button class="btn btn-primary" type="submit">Filter</button>
					</div>
					<div class="col-md-auto d-grid">
						<a class="btn btn-outline-secondary" th:href="@{/admin/rent-payments}">Clear</a>
					</div>
				</form>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>Tenant</th>
									<th>PG</th>
									<th>Owner</th>
									<th>Amount</th>
									<th>Month</th>
									<th>Year</th>
									<th>Status</th>
									<th>Payment Date</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="payment : ${rentPayments}">
									<td>
										<div class="fw-semibold" th:text="${payment.tenant.fullName}">Tenant</div>
										<div class="small text-secondary" th:text="${payment.tenant.email}">tenant@example.com</div>
									</td>
									<td th:text="${payment.pgListing.pgName}">PG</td>
									<td th:text="${payment.pgListing.owner.fullName}">Owner</td>
									<td>Rs. <span th:text="${payment.amount}">9000</span></td>
									<td th:text="${payment.month}">JUNE</td>
									<td th:text="${payment.year}">2026</td>
									<td>
										<span class="badge" th:classappend="${payment.status.name() == 'PAID'} ? ' text-bg-success' : (${payment.status.name() == 'OVERDUE'} ? ' text-bg-danger' : ' text-bg-warning')" th:text="${payment.status}">PENDING</span>
									</td>
									<td th:text="${payment.paymentDate != null ? #temporals.format(payment.paymentDate, 'dd MMM yyyy HH:mm') : '-'}">-</td>
								</tr>
								<tr th:if="${#lists.isEmpty(rentPayments)}">
									<td colspan="8" class="text-center text-secondary py-4">No rent payments found.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
