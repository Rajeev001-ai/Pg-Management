<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Register | PG Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- EMBEDDED CSS -->
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0b0f19, #141a2e);
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    .register-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 40px;

      width: 100%;
      max-width: 480px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.45);
    }

    .brand {
      font-size: 1.9rem;
      font-weight: 800;
      text-align: center;
    }

    .brand span {
      background: linear-gradient(90deg, #4f8cff, #9b6dff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      font-size: 0.95rem;
      margin: 10px 0 30px;
    }

    .form-control,
    .form-select {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
    }

    .form-control::placeholder {
      color: #9ca3af;
    }

    .form-control:focus,
    .form-select:focus {
      background: rgba(255,255,255,0.15);
      color: #fff;
      box-shadow: none;
      border: 1px solid #4f8cff;
    }

    .form-select option {
      color: #000;
    }

    .btn-primary {
      background: linear-gradient(90deg, #4f8cff, #9b6dff);
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(79,140,255,0.45);
    }

    .extra-links {
      text-align: center;
      margin-top: 25px;
    }

    .extra-links a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    .error-msg {
      background: rgba(239,68,68,0.18);
      color: #fecaca;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .footer-text {
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 25px;
    }
        /* NAVBAR */
.glass-nav {
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.auth-wrapper {
  min-height: 100vh;
  padding-top: 120px;   /* navbar height space */
  padding-bottom: 60px;
  display: flex;
  justify-content: center;
  align-items: center;
}

  </style>
</head>
<body>
        <!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top glass-nav">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4">PG<span class="text-primary">Manager</span></a>
    <div class="ms-auto">
      <a th:href="@{/login}" class="btn btn-outline-light me-2">Login</a>
      <a th:href="@{/}" class="btn btn-primary">Home</a>
    </div>
  </div>
</nav>

<div class="auth-wrapper">
 <div class="register-card" data-aos="zoom-in">

  <div class="brand">
    PG<span>Manager</span>
  </div>

  <div class="subtitle">
    Create your account & start managing your PG
  </div>

  <!-- ERROR MESSAGE -->
  <div th:if="${error}" class="error-msg" th:text="${error}"></div>

  <!-- REGISTER FORM -->
  <form th:action="@{/register}" method="post">

    <div class="mb-3">
      <input type="text"
             name="name"
             class="form-control"
             placeholder="Full Name"
             required>
    </div>

    <div class="mb-3">
      <input type="email"
             name="email"
             class="form-control"
             placeholder="Email Address"
             required>
    </div>

    <div class="mb-3">
      <input type="tel"
             name="phone"
             class="form-control"
             placeholder="Phone Number"
             required>
    </div>

    <div class="mb-3">
      <select name="role" class="form-select" required>
        <option value="">Select Role</option>
        <option value="OWNER">PG Owner</option>
        <option value="TENANT">Tenant</option>
      </select>
    </div>

    <div class="mb-3">
      <input type="password"
             name="password"
             class="form-control"
             placeholder="Password"
             required>
    </div>

    <button type="submit" class="btn btn-primary w-100 mt-2">
      Create Account
    </button>

  </form>

  <div class="extra-links">
    Already have an account?
    <a th:href="@{/login}">Login here</a>
  </div>

  <div class="footer-text">
    © 2026 PG Manager · Secure Registration
  </div>

</div>
</div>


<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({ duration: 900, once: true });
</script>

</body>
</html>
