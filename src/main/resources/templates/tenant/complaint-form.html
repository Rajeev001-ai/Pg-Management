<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Create Complaint | StayNext Tenant</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/tenant-sidebar :: sidebar('complaints')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Create Complaint</span>
			</nav>
			<div class="dashboard-content">
				<div class="card form-card">
					<div class="card-body p-4">
						<h2 class="h4 fw-bold mb-1" th:text="${pgListing.pgName}">PG Name</h2>
						<p class="text-secondary mb-4" th:text="${pgListing.area + ', ' + pgListing.city}">Area, City</p>
						<form th:object="${complaint}" th:action="@{/tenant/complaints/create/{pgId}(pgId=${pgListing.id})}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<div class="mb-3">
								<label class="form-label">Title</label>
								<input class="form-control" th:errorclass="is-invalid" th:field="*{title}" required>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
							</div>
							<div class="mb-3">
								<label class="form-label">Description</label>
								<textarea class="form-control" th:errorclass="is-invalid" rows="5" th:field="*{description}" required></textarea>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
							</div>
							<div class="d-flex gap-2">
								<button class="btn btn-primary" type="submit">Submit Complaint</button>
								<a class="btn btn-outline-secondary" th:href="@{/tenant/search-pg/details/{id}(id=${pgListing.id})}">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
