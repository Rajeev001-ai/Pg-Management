<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tenant Dashboard | PG Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- AOS for animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>
        body {
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* Top Navbar */
        .topbar {
            background: #0d6efd;
            color: white;
            padding: 14px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .topbar a {
            color: white;
            text-decoration: none;
        }

        /* Cards */
        .card-dashboard {
            border-radius: 18px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card-dashboard:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .card-dashboard i {
            font-size: 3rem;
            margin-bottom: 10px;
            color: white;
        }

        .card-rent { background: linear-gradient(135deg, #0d6efd, #3b82f6); color: white; }
        .card-complaint { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: white; }
        .card-profile { background: linear-gradient(135deg, #10b981, #06b6d4); color: white; }
    </style>
</head>
<body>

<!-- Top Navbar -->
<div class="topbar">
    <h5>Welcome, <span th:text="${tenant}">Tenant</span> 👋</h5>
    <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
</div>

<!-- Dashboard Cards -->
<div class="container my-5">
    <div class="row g-4">
        <div class="col-md-4" data-aos="fade-up">
            <a th:href="@{/tenant/rent}" style="text-decoration:none;">
                <div class="card-dashboard card-rent">
                    <i class="fa-solid fa-indian-rupee-sign"></i>
                    <h5 class="mt-3">View Rent</h5>
                    <p>Check your monthly rent status</p>
                </div>
            </a>
        </div>
        <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
            <a th:href="@{/tenant/complaint}" style="text-decoration:none;">
                <div class="card-dashboard card-complaint">
                    <i class="fa-solid fa-comments"></i>
                    <h5 class="mt-3">Raise Complaint</h5>
                    <p>Report issues to the PG owner</p>
                </div>
            </a>
        </div>
        <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
            <a th:href="@{/tenant/profile}" style="text-decoration:none;">
                <div class="card-dashboard card-profile">
                    <i class="fa-solid fa-user"></i>
                    <h5 class="mt-3">Profile</h5>
                    <p>View or edit your profile info</p>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
    AOS.init({ duration: 900, once: true });
</script>

</body>
</html>
