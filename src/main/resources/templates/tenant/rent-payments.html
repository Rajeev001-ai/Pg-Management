<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Rent Payments | StayNext Tenant</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/tenant-sidebar :: sidebar('rent-payments')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Rent Payments</span>
			</nav>
			<div class="dashboard-content">
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>PG</th>
									<th>Month</th>
									<th>Year</th>
									<th>Amount</th>
									<th>Status</th>
									<th>Payment Date</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="payment : ${rentPayments}">
									<td th:text="${payment.pgListing.pgName}">PG</td>
									<td th:text="${payment.month}">January</td>
									<td th:text="${payment.year}">2026</td>
									<td>Rs. <span th:text="${payment.amount}">9000</span></td>
									<td>
										<span class="badge" th:classappend="${payment.status.name() == 'PAID'} ? ' text-bg-success' : (${payment.status.name() == 'OVERDUE'} ? ' text-bg-danger' : ' text-bg-warning')" th:text="${payment.status}">PENDING</span>
									</td>
									<td th:text="${payment.paymentDate ?: '-'}">-</td>
								</tr>
								<tr th:if="${#lists.isEmpty(rentPayments)}">
									<td colspan="6" class="text-center text-secondary py-4">No rent payment records yet.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
				<p class="small text-secondary mt-3 mb-0">Online payment integration is not enabled yet.</p>
			</div>
		</main>
	</div>
</div>
</body>
</html>
