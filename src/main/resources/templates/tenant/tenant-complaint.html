<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tenant Complaints</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            animation: fadeUp 0.7s ease;
        }

        .card-header {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            color: white;
            border-radius: 18px 18px 0 0;
        }

        textarea {
            resize: none;
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- PAGE TITLE -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Raise a Complaint</h2>
        <p class="text-muted">Let us know your issue, we’ll resolve it soon</p>
    </div>

    <!-- COMPLAINT FORM -->
    <div class="card mb-5">
        <div class="card-header">
            <h5 class="mb-0">
                <i class="fa-solid fa-pen-to-square me-2"></i> New Complaint
            </h5>
        </div>

        <div class="card-body">
            <form th:action="@{/tenant/complaint}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Complaint Message</label>
                    <textarea class="form-control"
                              name="message"
                              rows="4"
                              placeholder="Describe your issue..."
                              required></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/tenant/dashboard}" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-arrow-left"></i> Back
                    </a>

                    <button type="submit" class="btn btn-primary px-4">
                        <i class="fa-solid fa-paper-plane"></i> Submit
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- COMPLAINT LIST -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">
                <i class="fa-solid fa-list me-2"></i> My Complaints
            </h5>
        </div>

        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Message</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="c : ${complaints}">
                        <td th:text="${c.message}">Water issue</td>
                        <td>
                            <span th:text="${c.status}"
                                 >
                                PENDING
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(complaints)}">
                        <td colspan="2" class="text-center text-muted py-4">
                            No complaints raised yet
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
