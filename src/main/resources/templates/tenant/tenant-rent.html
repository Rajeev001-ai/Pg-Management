<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Rent</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            animation: fadeUp 0.7s ease;
        }

        .card-header {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            border-radius: 18px 18px 0 0;
        }

        .badge-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- PAGE TITLE -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">My Rent History</h2>
        <p class="text-muted">Track your monthly rent payments</p>
    </div>

    <!-- RENT CARD -->
    <div class="card">

        <div class="card-header">
            <h5 class="mb-0">
                <i class="fa-solid fa-indian-rupee-sign me-2"></i> Rent Records
            </h5>
        </div>

        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Month</th>
                        <th>Amount (₹)</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="r : ${rents}">
                        <td th:text="${r.month}">Jan 2026</td>
                        <td th:text="${r.amount}">5000</td>
                        <td>
                            <span th:text="${r.status}"
                                  th:classappend="${r.status == 'PAID'} ? 'badge bg-success badge-status' :
                                                  ${r.status == 'UNPAID'} ? 'badge bg-danger badge-status' :
                                                  'badge bg-secondary badge-status'">
                                PAID
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(rents)}">
                        <td colspan="3" class="text-center text-muted py-4">
                            No rent records found
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- BACK BUTTON -->
    <div class="text-center mt-4">
        <a th:href="@{/tenant/dashboard}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </div>

</div>

</body>
</html>
