<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Send Booking Request | StayNext Tenant</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/tenant-sidebar :: sidebar('bookings')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Send Booking Request</span>
			</nav>
			<div class="dashboard-content">
				<div class="card form-card">
					<div class="card-body p-4">
						<h2 class="h4 fw-bold mb-1" th:text="${pgListing.pgName}">PG Name</h2>
						<p class="text-secondary mb-4" th:text="${pgListing.area + ', ' + pgListing.city}">Area, City</p>
						<form th:object="${bookingRequest}" th:action="@{/tenant/bookings/create/{pgId}(pgId=${pgListing.id})}" method="post">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
							<div class="mb-3">
								<label class="form-label">Preferred Room</label>
								<select class="form-select" name="roomId">
									<option value="">No specific room</option>
									<option th:each="room : ${availableRooms}" th:value="${room.id}" th:text="${room.roomNumber + ' - ' + room.roomType + ' - Rs. ' + room.rentAmount}">Room</option>
								</select>
							</div>
							<div class="mb-3">
								<label class="form-label">Message</label>
								<textarea class="form-control" th:errorclass="is-invalid" th:field="*{message}" rows="4" maxlength="500" placeholder="Write a short message for the PG owner"></textarea>
								<div class="invalid-feedback" th:if="${#fields.hasErrors('message')}" th:errors="*{message}"></div>
							</div>
							<div class="d-flex gap-2">
								<button class="btn btn-primary" type="submit">Send Request</button>
								<a class="btn btn-outline-secondary" th:href="@{/tenant/search-pg/details/{id}(id=${pgListing.id})}">Cancel</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
