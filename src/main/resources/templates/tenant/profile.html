<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tenant Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f0f4ff, #e6ebff);
            font-family: 'Segoe UI', sans-serif;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeUp 0.8s ease;
        }

        .profile-header {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            padding: 30px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 15px;
            font-size: 3rem;
            color: #0d6efd;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .info-box {
            background: #f8f9ff;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .info-box span {
            font-weight: 600;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="profile-card">

                <!-- HEADER -->
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <h4 th:text="${tenant != null ? tenant.username : 'Tenant'}">Tenant Name</h4>
                    <p class="mb-0">PG Resident</p>
                </div>

                <!-- BODY -->
                <div class="p-4">

                    <div class="info-box">
                        <span><i class="fa-solid fa-envelope me-2"></i>Email</span>
                        <span th:text="${tenant.username}">email@gmail.com</span>
                    </div>

                    <div class="info-box">
                        <span><i class="fa-solid fa-phone me-2"></i>Phone</span>
                        <span th:text="${tenant.phone}">9999999999</span>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/tenant/dashboard}" class="btn btn-outline-primary">
                            <i class="fa-solid fa-arrow-left"></i> Dashboard
                        </a>
                        <a th:href="@{/logout}" class="btn btn-danger">
                            <i class="fa-solid fa-right-from-bracket"></i> Logout
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
