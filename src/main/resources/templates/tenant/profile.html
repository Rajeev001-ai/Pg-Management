<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>My Profile | StayNext Tenant</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/tenant-sidebar :: sidebar('profile')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">My Profile</span>
			</nav>
			<div class="dashboard-content">
				<div class="card info-card">
					<div class="card-body p-4">
						<h2 class="h4 fw-bold mb-4" th:text="${user.fullName}">Tenant Name</h2>
						<div class="row g-4">
							<div class="col-md-6">
								<p class="text-secondary mb-1">Email</p>
								<p class="fw-semibold mb-0" th:text="${user.email}">tenant@gmail.com</p>
							</div>
							<div class="col-md-6">
								<p class="text-secondary mb-1">Phone</p>
								<p class="fw-semibold mb-0" th:text="${user.phone ?: '-'}">9999999999</p>
							</div>
							<div class="col-md-6">
								<p class="text-secondary mb-1">Role</p>
								<span class="badge text-bg-primary" th:text="${user.role}">TENANT</span>
							</div>
							<div class="col-md-6">
								<p class="text-secondary mb-1">Account Status</p>
								<span class="badge" th:classappend="${user.enabled} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${user.enabled} ? 'Active' : 'Disabled'">Active</span>
							</div>
							<div class="col-md-6">
								<p class="text-secondary mb-1">Joined On</p>
								<p class="fw-semibold mb-0" th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">01 Jan 2026</p>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
