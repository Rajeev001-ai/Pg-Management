<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Complaints | StayNext Tenant</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="container-fluid">
	<div class="row">
		<aside th:replace="~{fragments/tenant-sidebar :: sidebar('complaints')}"></aside>
		<main class="col-lg-10 p-0 main-panel">
			<nav class="navbar topbar">
				<span class="navbar-brand mb-0 h1">Complaints</span>
				<a class="btn btn-primary" th:href="@{/tenant/search-pg}">Search PG</a>
			</nav>
			<div class="dashboard-content">
				<div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
				<div class="card table-card">
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-hover align-middle mb-0">
								<thead class="table-light">
								<tr>
									<th>PG</th>
									<th>Title</th>
									<th>Description</th>
									<th>Status</th>
								</tr>
								</thead>
								<tbody>
								<tr th:each="complaint : ${complaints}">
									<td th:text="${complaint.pgListing.pgName}">PG</td>
									<td th:text="${complaint.title}">Title</td>
									<td th:text="${complaint.description}">Description</td>
									<td>
										<span class="badge" th:classappend="${complaint.status.name() == 'RESOLVED'} ? ' text-bg-success' : (${complaint.status.name() == 'IN_PROGRESS'} ? ' text-bg-primary' : ' text-bg-warning')" th:text="${complaint.status}">OPEN</span>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(complaints)}">
									<td colspan="4" class="text-center text-secondary py-4">No complaints submitted yet.</td>
								</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
</body>
</html>
